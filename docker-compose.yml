services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - '4303:4303'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentforge
      NODE_ENV: production
      PORT: '4303'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentforge
      NODE_ENV: production

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - '4302:3000'
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4303

volumes:
  postgres_data:
